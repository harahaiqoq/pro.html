<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harsh Upadhyay | Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            --dark-bg: #030303;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { background-color: var(--dark-bg); color: #fff; overflow-x: hidden; }

        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #030303 100%);
            z-index: -1; opacity: 0.6;
        }

        #loader {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.8s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .loader-text {
            font-family: 'Syncopate', sans-serif; font-size: 1.5rem; letter-spacing: 10px;
            background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hero {
            min-height: 100vh; display: flex; align-items: center; justify-content: space-between;
            padding: 80px 10%; gap: 50px;
        }

        .hero-content { flex: 1.2; z-index: 2; }
        .hero-content h2 { font-size: 1rem; color: #a855f7; letter-spacing: 3px; margin-bottom: 20px; text-transform: uppercase; }
        .hero-content h1 { font-size: clamp(3rem, 7vw, 5rem); font-weight: 800; line-height: 0.9; margin-bottom: 25px; }
        .gradient-text { background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- PNG PHOTO FIX AREA --- */
        .image-container {
            flex: 0.8;
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 4/5;
            background: var(--glass);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: flex-end; /* PNG niche se touch honi chahiye */
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            /* Soft Glow behind PNG */
            background: radial-gradient(circle at center, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
        }

        .image-container img {
            width: 90%; /* Thoda sa gap sides se taaki premium lage */
            height: 95%;
            object-fit: contain; /* PNG ko bina kaate fit karega */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); /* PNG par shadow */
            display: block;
        }

        .contact-grid {
            padding: 80px 10%; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;
        }
        .contact-box {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 40px; border-radius: 30px; text-align: center;
            transition: 0.4s; text-decoration: none; color: #fff;
        }
        .contact-box:hover { border-color: #ec4899; transform: translateY(-10px); background: rgba(255, 255, 255, 0.08); }
        .contact-box i { font-size: 2.5rem; margin-bottom: 20px; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        @media (max-width: 992px) {
            .hero { flex-direction: column-reverse; height: auto; padding: 120px 5% 50px; text-align: center; }
            .hero-content h1 { font-size: 3.5rem; }
            .image-container { width: 100%; max-width: 320px; margin-bottom: 30px; }
            .contact-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>

    <div id="loader">
        <div class="loader-text">HARSH UPADHYAY</div>
        <p style="margin-top: 20px; font-size: 0.8rem; letter-spacing: 5px; color: #555;">WELCOME GUYS...</p>
    </div>

    <section class="hero">
        <div class="hero-content" data-aos="fade-right">
            <h2>Creative Developer</h2>
            <h1>Elevating <br><span class="gradient-text">Experiences.</span></h1>
            <p style="color: #888; margin-bottom: 40px; line-height: 1.8; max-width: 500px;">
                18-year-old developer based in India. Master of HTML, CSS, and JS. Bringing Anime vibes and Professional logic to the web.
            </p>
            <div style="display: flex; gap: 20px; justify-content: inherit;">
                <a href="mailto:harsh48227@gmail.com" style="padding: 18px 40px; background: #fff; color: #000; border-radius: 100px; text-decoration: none; font-weight: 800; font-size: 0.9rem;">WORK WITH ME</a>
            </div>
        </div>

        <div class="image-container" data-aos="zoom-in-left">
            <img src="harsh.png" alt="Harsh Upadhyay Portfolio">
        </div>
    </section>

    <section class="contact-grid">
        <a href="https://wa.me/918920840688" class="contact-box" data-aos="fade-up">
            <i class="fab fa-whatsapp"></i>
            <h3>WhatsApp</h3>
        </a>
        <a href="https://t.me/+DvSgQwffeiwxMzg1" class="contact-box" data-aos="fade-up" data-aos-delay="100">
            <i class="fab fa-telegram-plane"></i>
            <h3>Telegram</h3>
        </a>
        <a href="mailto:harsh48227@gmail.com" class="contact-box" data-aos="fade-up" data-aos-delay="200">
            <i class="far fa-envelope"></i>
            <h3>Email</h3>
        </a>
    </section>

    <footer style="padding: 50px; text-align: center; color: #444; border-top: 1px solid #111;">
        <p>© 2026 DESIGNED BY HARSH. ALL RIGHTS RESERVED.</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
            }, 2500);
        });
    </script>
</body>
</html>
